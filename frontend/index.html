<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>@purplesector.py — F1 Analytics</title>
    <meta name="description" content="Deep-dive F1 analytics: qualifying telemetry battles, season-long pace deltas, lap ladders, tyre strategies, race pace trends, and overtake leaderboards." />
    <meta name="theme-color" content="#b026ff" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.)
         Set VITE_APP_URL in your deployment environment (e.g. https://purplesector.vercel.app).
         Add a 1200×630 PNG screenshot of the app as frontend/public/og-preview.png. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="@purplesector.py" />
    <meta property="og:title" content="@purplesector.py — F1 Analytics" />
    <meta property="og:description" content="Deep-dive F1 analytics: qualifying telemetry battles, season-long pace deltas, lap ladders, tyre strategies, race pace trends, and overtake leaderboards." />
    <meta property="og:image" content="%VITE_APP_URL%/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="%VITE_APP_URL%" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="@purplesector.py — F1 Analytics" />
    <meta name="twitter:description" content="Deep-dive F1 analytics: qualifying telemetry battles, season-long pace deltas, lap ladders, tyre strategies, race pace trends, and overtake leaderboards." />
    <meta name="twitter:image" content="%VITE_APP_URL%/og-preview.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
